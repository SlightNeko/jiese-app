name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses & Install Platform
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1

      - name: Install Gradle & Generate Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.14.1-bin.zip
          unzip -q gradle-8.14.1-bin.zip
          mkdir -p /tmp/gradle-init && cd /tmp/gradle-init
          ../gradle-8.14.1/bin/gradle wrapper --gradle-version 8.14.1
          cp gradlew gradlew.bat "$GITHUB_WORKSPACE/"
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/gradle/wrapper/"

      - name: Build with Gradle
        run: |
          cd $GITHUB_WORKSPACE
          chmod +x gradlew
          ./gradlew composeApp:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiese-app-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
